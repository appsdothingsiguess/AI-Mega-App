# litellm_config.yaml
# Local models are served by Ollama on the RTX 3090 box (llm-stack/ollama),
# reachable on the LAN at 192.168.0.240:11434 (start.sh sets OLLAMA_HOST=0.0.0.0:11434).
# Use the ollama_chat/ provider (not bare ollama/) — it uses the OpenAI-compatible
# chat format, which is required to preserve tool-calling behavior.
model_list:
  # Local models (Ollama, RTX 3090 @ 192.168.0.240)
  - model_name: local/qwen3-8b
    litellm_params:
      model: ollama_chat/qwen3:8b-32k
      api_base: http://192.168.0.240:11434

  - model_name: local/qwen2.5-coder-7b
    litellm_params:
      model: ollama_chat/qwen2.5-coder:7b-32k
      api_base: http://192.168.0.240:11434

  - model_name: local/qwen3-coder-30b
    litellm_params:
      model: ollama_chat/qwen3-coder:30b-16k
      api_base: http://192.168.0.240:11434

  - model_name: local/deepseek-r1-32b
    litellm_params:
      model: ollama_chat/deepseek-r1:32b-16k
      api_base: http://192.168.0.240:11434

  - model_name: local/gemma4-12b
    litellm_params:
      model: ollama_chat/gemma4:12b-32k
      api_base: http://192.168.0.240:11434

  - model_name: local/deepseek-r1-8b
    litellm_params:
      model: ollama_chat/deepseek-r1:8b-32k
      api_base: http://192.168.0.240:11434

  # Remote models (OpenCode Go — OpenAI-compatible chat/completions)
  # model_name = app alias (settings.json). litellm_params.model = OpenCode provider ID.
  # See https://opencode.ai/docs/go/ for current model IDs (use dots, e.g. kimi-k2.6).

  - model_name: remote/deepseek-v4-pro
    litellm_params:
      model: openai/deepseek-v4-pro
      api_base: https://opencode.ai/zen/go/v1
      api_key: os.environ/OPENCODE_API_KEY
      extra_headers:
        User-Agent: prompter-x/1.0

  - model_name: remote/kimi-k2-6
    litellm_params:
      model: openai/kimi-k2.6
      api_base: https://opencode.ai/zen/go/v1
      api_key: os.environ/OPENCODE_API_KEY
      extra_headers:
        User-Agent: prompter-x/1.0
